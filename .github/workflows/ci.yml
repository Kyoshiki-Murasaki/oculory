name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  core:
    name: Core (${{ matrix.os }}, Node ${{ matrix.node }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            node: 22.13.0
          - os: ubuntu-latest
            node: 24
          - os: macos-latest
            node: 24
          - os: windows-latest
            node: 24
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node }}
          package-manager-cache: false
      - name: Set up uv for the exact provider-free pilot Python
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: 0.11.28
          enable-cache: false
      - run: npm ci
      - run: npm run build
      - run: npm run typecheck
      - name: Stress Git fixture determinism
        if: runner.os == 'Windows'
        run: npm run diagnose:git-fixture
      - run: npm test
      - run: npm run test:gate-f0
      - run: npm run validate:gate-f-authorization
      - run: npm run validate:phase6-evidence-index
      - name: Exercise the portable launcher
        run: |
          node bin/oculory --help
          node bin/oculory --version
          node bin/oculory doctor
      - name: Prepare the pinned provider-free Git MCP target
        run: node scripts/prepare-pilot-target.mjs
      - name: Run the offline pilot smoke with spaces
        run: npm run pilot:smoke -- --spaces

  offline-experiments:
    name: Deterministic offline experiments
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          package-manager-cache: false
      - run: npm ci
      - run: npm run experiment
      - run: npm run experiment:filesystem
      - run: npm run experiment:issue-tracker

  package-install-smoke:
    name: Packed consumer install
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          package-manager-cache: false
      - run: npm ci
      - run: npm run verify:package

  mlp-integration:
    name: MLP integration (${{ matrix.os }}, Node ${{ matrix.node }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            node: 22.13.0
          - os: ubuntu-latest
            node: 24
          - os: macos-latest
            node: 24
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node }}
          package-manager-cache: false
      - run: npm ci
      - run: npm run typecheck
      - name: Run provider-free Action success and violation harness
        run: npm run verify:action
      - name: Install the tarball globally and run the offline demo from a path with spaces
        run: npm run verify:package

  mlp-adapters:
    name: MLP adapters (Postgres service and local GitHub mock)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: oculory_test
          POSTGRES_USER: oculory_test
          POSTGRES_PASSWORD: local-test-only
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U oculory_test -d oculory_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          package-manager-cache: false
      - run: npm ci
      - name: Run ordinary tests with disposable Postgres and the in-process GitHub mock
        run: npm test
        env:
          OCULORY_TEST_POSTGRES_URL: postgresql://oculory_test:local-test-only@127.0.0.1:5432/oculory_test

  mlp-composite-action:
    name: Composite Action exit-code propagation
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          package-manager-cache: false
      - name: Baseline replay succeeds
        id: baseline
        uses: ./
        with:
          task: fixtures/demo/task.yaml
          contract: fixtures/demo/contract.yaml
          model: baseline
      - name: Baseline exposes a report
        shell: bash
        env:
          REPORT_PATH: ${{ steps.baseline.outputs.report-path }}
        run: |
          test -f "$REPORT_PATH"
          node -e "const r=require(process.env.REPORT_PATH); if(r.status !== 'PASS' || r.exit_code !== 0) process.exit(1)"
      - name: Changed replay fails the Action step
        id: changed
        continue-on-error: true
        uses: ./
        with:
          task: fixtures/demo/task.yaml
          contract: fixtures/demo/contract.yaml
          model: changed
      - name: Assert behavioral violation propagation
        if: always()
        shell: bash
        env:
          STEP_OUTCOME: ${{ steps.changed.outcome }}
          REPORT_PATH: ${{ steps.changed.outputs.report-path }}
        run: |
          test "$STEP_OUTCOME" = failure
          test -f "$REPORT_PATH"
          node -e "const r=require(process.env.REPORT_PATH); if(r.status !== 'FAIL' || r.exit_code !== 2) process.exit(1)"
