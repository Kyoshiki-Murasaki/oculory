name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  core:
    name: Core (${{ matrix.os }}, Node ${{ matrix.node }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            node: 22.13.0
          - os: ubuntu-latest
            node: 24
          - os: macos-latest
            node: 24
          - os: windows-latest
            node: 24
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node }}
          package-manager-cache: false
      - name: Set up Python for the provider-free pilot target
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: 3.12.13
          cache: false
      - run: npm ci
      - run: npm run build
      - run: npm run typecheck
      - name: Stress Git fixture determinism
        if: runner.os == 'Windows'
        run: npm run diagnose:git-fixture
      - run: npm test
      - run: npm run test:gate-f0
      - run: npm run validate:gate-f-authorization
      - run: npm run validate:phase6-evidence-index
      - name: Exercise the portable launcher
        run: |
          node bin/oculory --help
          node bin/oculory --version
          node bin/oculory doctor
      - name: Prepare the pinned provider-free Git MCP target
        run: node scripts/prepare-pilot-target.mjs
      - name: Run the offline pilot smoke with spaces
        run: npm run pilot:smoke -- --spaces

  offline-experiments:
    name: Deterministic offline experiments
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          package-manager-cache: false
      - run: npm ci
      - run: npm run experiment
      - run: npm run experiment:filesystem
      - run: npm run experiment:issue-tracker

  package-install-smoke:
    name: Packed consumer install
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          package-manager-cache: false
      - run: npm ci
      - run: npm run verify:package
